services:
  db:
    image: postgres:18-alpine
    container_name: hq_outlet_db
    env_file:
      - ./backend/.env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - hq_outlet_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: hq_outlet_api
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hq_outlet
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hq_outlet_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: hq_outlet_frontend
    environment:
      NODE_ENV: development
      VITE_API_URL: ${VITE_API_URL}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - hq_outlet_net

volumes:
  db_data:

networks:
  hq_outlet_net:
    driver: bridge
